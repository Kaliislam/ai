name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Python test matrix
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy httpx

      - name: Lint with ruff
        run: |
          ruff check turkish_jarvis/ --output-format=github
          ruff format --check turkish_jarvis/

      - name: Type check with mypy (optional)
        continue-on-error: true
        run: |
          mypy turkish_jarvis/ --ignore-missing-imports || true

      - name: Run pytest
        run: |
          pytest turkish_jarvis/tests/ -v --tb=short --color=yes

      - name: Upload coverage (optional)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Build Docker image
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t turkish-jarvis:latest .

      - name: Image size check
        run: |
          docker images turkish-jarvis:latest --format "table {{.Size}}"

      - name: Docker smoke test
        run: |
          docker run -d --name jarvis-smoke -p 8000:8000 turkish-jarvis:latest
          sleep 5
          # Healthcheck is embedded in Dockerfile; wait for it
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health; then
              echo "Healthcheck OK"
              exit 0
            fi
            sleep 3
          done
          echo "Healthcheck FAILED"
          docker logs jarvis-smoke
          exit 1
